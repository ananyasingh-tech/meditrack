<!DOCTYPE html>
<html>
<head>
<title>Add Maintenance</title>
</head>

<body>

<h2>Add Maintenance Record</h2>

<form method="POST">

<label>Date</label><br>
<input type="date" name="maintenance_date"><br><br>

<label>Technician</label><br>
<input type="text" name="technician_name"><br><br>

<label>Issue</label><br>
<textarea name="issue_reported"></textarea><br><br>

<label>Resolution</label><br>
<textarea name="resolution_notes"></textarea><br><br>

<label>Next Due Date</label><br>
<input type="date" name="next_due_date"><br><br>

<button type="submit">Save</button>

</form>

</body>
</html>
